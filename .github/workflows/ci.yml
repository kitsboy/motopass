name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  btcmap-sync:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run btcmap:density
      - run: npm run btcmap:sync
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: weekly btcmap density + cache sync'
          file_pattern: 'public/data/btcmap*'

  build-test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run sync:build
      - run: npm run lint
      - run: npm run prettier:check
      - run: npm run validate:data
      - run: npm run validate:stamps
      - name: Ensure pitch anchor in sync
        run: |
          PIN=$(node -p "JSON.parse(require('fs').readFileSync('research/pitch-anchor.json','utf8')).btc_usd_reference")
          GEN=$(node -p "JSON.parse(require('fs').readFileSync('research/pitch-anchor.json','utf8')).generated_at")
          PITCH_ANCHOR_BTC_USD=$PIN PITCH_ANCHOR_GENERATED_AT=$GEN npm run pitch:sync
          git diff --exit-code research/pitch-anchor.json docs/pitch/ANCHOR-SNAPSHOT.md \
            || (echo "Run npm run pitch:sync and commit anchor files" && exit 1)
      - run: npm test
      - run: npm run build
      - run: npm run check:build-salt
      - run: node scripts/check-bundle-size.mjs
      - name: Lighthouse a11y budget (warn-only)
        run: npm run a11y:check
        continue-on-error: true
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run sync:build
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        id: deploy
        run: npx wrangler pages deploy dist --project-name=motopass --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true
      - name: Deploy summary
        if: always()
        run: |
          BUILD_ID=$(node -p "require('fs').readFileSync('src/lib/buildInfo.ts','utf8').match(/BUILD_ID = '([^']+)'/)[1]")
          {
            echo "## MotoPass deploy"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Site | https://motopass.giveabit.io |"
            echo "| BUILD | \`${BUILD_ID}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Artifact | \`dist/\` from build-test job (7-day retention) |"
            echo ""
            echo "Post-deploy: \`live-health\` job runs \`verify:live:ci\`."
          } >> "$GITHUB_STEP_SUMMARY"

  live-health:
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run verify:live:ci
      - name: Deploy summary JSON
        if: always()
        run: node scripts/deploy-summary.mjs --out artifacts/deploy-summary.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deploy-summary
          path: artifacts/deploy-summary.json
          retention-days: 30
          if-no-files-found: ignore